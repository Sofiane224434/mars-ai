services:
  mars-ai-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mars-ai-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: localhost
    network_mode: host
    volumes:
      - ./backend/uploads:/app/backend/uploads
