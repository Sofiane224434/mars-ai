name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_REPO: ${{ github.repository }}
      TARGET_BRANCH: ${{ github.ref_name }}
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
      VPS_COMPOSE_PROJECT: ${{ vars.VPS_COMPOSE_PROJECT }}

    steps:
      - name: Deploy on VPS (project scope only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script_stop: true
          envs: TARGET_REPO,TARGET_BRANCH,VPS_APP_DIR,VPS_COMPOSE_PROJECT
          script: |
            set -euo pipefail

            if [ -z "${VPS_APP_DIR:-}" ]; then
              echo "Missing required configuration VPS_APP_DIR"
              exit 1
            fi

            if [ ! -d "$VPS_APP_DIR/.git" ]; then
              echo "Repository not found in VPS_APP_DIR: $VPS_APP_DIR"
              exit 1
            fi

            cd "$VPS_APP_DIR"

            ORIGIN_URL="$(git config --get remote.origin.url || true)"
            if [ -z "$ORIGIN_URL" ] || [[ "$ORIGIN_URL" != *"$TARGET_REPO"* ]]; then
              echo "Safety check failed: $VPS_APP_DIR does not point to $TARGET_REPO"
              echo "Current origin: ${ORIGIN_URL:-<empty>}"
              exit 1
            fi

            git fetch --prune origin
            git checkout "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            git clean -fd

            if [ -n "${VPS_COMPOSE_PROJECT:-}" ]; then
              docker compose -p "$VPS_COMPOSE_PROJECT" up -d --build
              docker compose -p "$VPS_COMPOSE_PROJECT" ps
            else
              docker compose up -d --build
              docker compose ps
            fi
