services:
  mars-ai-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mars-ai-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${DB_HOST_DOCKER:-172.17.0.1}
    ports:
      - "127.0.0.1:5010:5000"
    volumes:
      - ./backend/uploads:/app/backend/uploads
